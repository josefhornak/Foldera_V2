# Local development services only — DO NOT run on a shared/public host.
# Ports are bound to loopback so the DB/cache are never exposed off-box.
services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: foldera
      POSTGRES_PASSWORD: foldera
      POSTGRES_DB: foldera_v2
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  valkey:
    image: valkey/valkey:8
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - valkeydata:/data

volumes:
  pgdata:
  valkeydata:
