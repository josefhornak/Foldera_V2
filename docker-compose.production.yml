services:
  api:
    build: .
    container_name: foldera-v2-api
    restart: unless-stopped
    env_file: backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://foldera:${POSTGRES_PASSWORD:?}@postgres:5432/foldera_v2
      REDIS_URL: redis://valkey:6379
    depends_on:
      - postgres
      - valkey
    ports:
      - '127.0.0.1:3000:3000'
    # Collection-email provisioning writes to the host Postfix virtual map and
    # creates maildirs (owned by the vhosts group, gid 5000). The host
    # postfix-watcher runs postmap + fixes permissions.
    group_add:
      - '5000'
    cap_add:
      - CHOWN
    volumes:
      # Manual uploads land here on the API and are processed by the worker
      - tmpfiles:/tmp/foldera-v2
      - /etc/postfix:/etc/postfix:rw
      - /var/mail/vhosts:/var/mail/vhosts

  worker:
    build: .
    container_name: foldera-v2-worker
    restart: unless-stopped
    command: ['node', 'dist/worker.js']
    env_file: backend/.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://foldera:${POSTGRES_PASSWORD:?}@postgres:5432/foldera_v2
      REDIS_URL: redis://valkey:6379
    depends_on:
      - postgres
      - valkey
    # Reads incoming mail from the maildir and moves new/ → cur/ (gid 5000).
    # The worker never provisions mailboxes, so it gets NO access to the host
    # Postfix config — only the maildir it actually reads/writes.
    group_add:
      - '5000'
    cap_add:
      - CHOWN
    volumes:
      - tmpfiles:/tmp/foldera-v2
      - /var/mail/vhosts:/var/mail/vhosts

  postgres:
    image: postgres:18
    container_name: foldera-v2-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: foldera
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
      POSTGRES_DB: foldera_v2
    volumes:
      # postgres:18 stores data under /var/lib/postgresql/<major>/docker — mount
      # the parent dir (not /data, which is the pre-18 convention)
      - pgdata:/var/lib/postgresql

  valkey:
    image: valkey/valkey:8
    container_name: foldera-v2-valkey
    restart: unless-stopped
    volumes:
      - valkeydata:/data

volumes:
  pgdata:
  valkeydata:
  tmpfiles:

networks:
  default:
    name: foldera-v2-net
